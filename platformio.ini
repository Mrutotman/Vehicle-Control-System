; ============================================================
; SIDLAK VCS - Multi-Board Configuration
; Select the target environment in the PlatformIO bottom bar
; ============================================================

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino
lib_ldf_mode = deep+
lib_extra_dirs = lib
monitor_speed = 115200
;monitor_filters = hexlify
build_flags = 
    -DHAL_UART_MODULE_ENABLED
    -DENABLE_HWSERIAL3

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_ldf_mode = deep+
lib_extra_dirs = lib
monitor_speed = 115200
;monitor_filters = hexlify

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino
lib_ldf_mode = deep+
lib_extra_dirs = lib
monitor_speed = 115200
;monitor_filters = hexlify